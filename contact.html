<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Doe - Contact</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Responsive Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">Joe Doe <span class="text-primary">CV</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-medium">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="experience.html">Experience</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <section class="card border-0 rounded-4 shadow-sm">
                    <div class="card-header bg-dark text-white py-3">
                        <h2 class="h4 fw-bold mb-0">Contact Me</h2>
                    </div>
                    <div class="card-body p-4">
                        <form action="#" method="POST">
                            <div class="mb-3">
                                <label for="nameInput" class="form-label fw-medium text-secondary">Name</label>
                                <input type="text" class="form-control" id="nameInput" placeholder="John Doe text" required>
                            </div>
                            <div class="mb-3">
                                <label for="emailInput" class="form-label fw-medium text-secondary">Email Address</label>
                                <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="messageInput" class="form-label fw-medium text-secondary">Message</label>
                                <textarea class="form-control" id="messageInput" rows="5" placeholder="Your message here..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold shadow-sm">Send Message</button>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t py-4 mt-auto">
        <div class="container text-center text-muted small">
            <p class="mb-0">&copy; 2026 Joe Doe. Built with Bootstrap 5.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
